<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>portfolio-dash — 登入</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"></link>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"></link>
<script>try{document.documentElement.dataset.theme=localStorage.getItem("pd_theme")||"dark"}catch(e){}</script>
<link rel="stylesheet" href="styles.css?v=0.1.20"></link>
<link rel="stylesheet" href="settings.css?v=0.1.20"></link>
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-card {
    width: 360px;
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .login-logo {
    font-family: var(--font-num);
    font-size: 20px; font-weight: 600;
    text-align: center;
  }
  .login-logo .tld { color: var(--accent); }
  .login-sub { text-align: center; font-size: 11px; color: var(--text-3); margin-top: -10px; }
  .login-error {
    font-size: 11px; color: var(--up);
    background: var(--up-soft); border: 1px solid rgba(240, 84, 79, 0.3);
    border-radius: var(--radius-sm); padding: 7px 10px;
  }
  .login-btn { width: 100%; justify-content: center; padding: 9px; font-size: 13px; }
</style>
</head>
<body data-page="login">
<div class="login-wrap">
  <form class="login-card" data-screen-label="登入卡" onsubmit="return false;">
    <div class="login-logo">portfolio<span class="tld">-dash</span></div>
    <div class="login-sub">個人多市場投資管理</div>
    <div class="login-hint" id="login-hint" hidden="hidden"></div>
    <div class="login-error" id="login-error" hidden="hidden">帳號或密碼錯誤</div>
    <div class="field">
      <label for="login-user">使用者</label>
      <input class="input" id="login-user" autocomplete="username" spellcheck="false"></input>
    </div>
    <div class="field">
      <label for="login-pass">密碼</label>
      <input class="input" id="login-pass" type="password" autocomplete="current-password"></input>
    </div>
    <button class="btn btn-primary login-btn" id="login-btn" type="submit">登入</button>
  </form>
</div>
<script src="api.js?v=0.1.20"></script>
<script>
  /* Backend-driven auth (spec 9.1). Submit POSTs /api/auth/login through the single
     pdApi fetch layer; on success the server sets the HttpOnly pd_session cookie and
     returns { username, name }, then we go to index.html. On a PdApiError (401 bad
     creds, or 400 body validation) we show the message in #login-error — the api.js
     401-redirect is suppressed on this page, so the error survives to be rendered.
     No network call on load (the shell, not this page, routes signed-out users here);
     empty-field validation stays client-side. */
  (function () {
    var userInput = document.getElementById('login-user');
    var passInput = document.getElementById('login-pass');
    var errEl = document.getElementById('login-error');
    var btn = document.getElementById('login-btn');

    function showError(msg) { errEl.textContent = msg; errEl.hidden = false; }

    async function submit() {
      var u = userInput.value.trim();
      var p = passInput.value;
      errEl.hidden = true;
      if (!u || !p) { showError('請輸入帳號與密碼'); return; }
      btn.disabled = true;
      try {
        await window.pdApi.post('/api/auth/login', { username: u, password: p });
        // Server set the pd_session cookie; head to the dashboard.
        window.location.href = 'index.html';
      } catch (e) {
        btn.disabled = false;
        if (e && e.status === 401) {
          showError('帳號或密碼錯誤');
        } else {
          showError((e && e.message) || '登入失敗');
        }
      }
    }

    btn.addEventListener('click', submit);
    userInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
    passInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
  })();
</script>
</body>
</html>
