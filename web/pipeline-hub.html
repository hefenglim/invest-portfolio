<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>portfolio-dash — 洞察管線中心</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"></link>
<script>try{document.documentElement.dataset.theme=localStorage.getItem("pd_theme")||"dark"}catch(e){}</script>
<link rel="stylesheet" href="styles.css?v=0.1.10"></link>
<link rel="stylesheet" href="settings.css?v=0.1.10"></link>
<link rel="stylesheet" href="pipeline.css?v=0.1.10"></link>
</head>
<body data-page="pipeline" data-title="洞察管線中心">
<div class="shell">
<aside id="sidebar"></aside>
<div class="shell-main">
<header id="topbar" class="topbar"></header>
<div class="page">

  <div class="pp-banner" data-screen-label="管線橫幅">
    <b>洞察管線中心</b>
    <span>以洞察任務為主角：觸發 → 輸入 → 組裝 → 執行 → 產出，一張卡看完一條管線。</span>
  </div>

  <div class="pp-health" id="pp-health" data-screen-label="全局健康列"></div>

  <section class="panel" data-screen-label="洞察任務管線">
    <div class="panel-head">
      <h2 class="panel-title">洞察任務</h2>
      <span class="panel-sub">每張卡 = 一條完整管線；點任一節點直接跳到該節設定</span>
      <span class="spacer"></span>
      <button class="btn" id="pp-official-pack" type="button"
        title="一鍵建立官方洞察套組：持倉週報＋個股健檢（含策略與週排程；已存在的任務會跳過）">啟用官方套組</button>
      <button class="btn btn-primary" id="pp-add" type="button">＋ 新增洞察任務</button>
    </div>
    <div class="pp-filter" id="pp-filter"></div>
    <div class="pp-list" id="pp-list"></div>
  </section>

  <div class="pp-assets" data-screen-label="資產庫">
    <a class="pp-asset" href="settings.html#prompts"><b>分析模板庫</b><span class="cnt" id="pp-cnt-templates">…</span><span>分析模板 — 設計物件，與執行解耦</span></a>
    <a class="pp-asset" href="settings.html#prompts"><b>數據變數庫</b><span class="cnt" id="pp-cnt-vars">…</span><span>變數總表＋預覽/測試送出</span></a>
    <a class="pp-asset" href="news.html"><b>新聞資料庫</b><span class="cnt">每晚整理入庫</span><span>個股新聞瀏覽＋過濾＋逐則 token/成本評估</span></a>
    <a class="pp-asset" href="settings.html#scheduler"><b>運行中心</b><span class="cnt">全部 jobs</span><span>跨任務的排程工作表與完整歷史</span></a>
    <a class="pp-asset" href="settings.html"><b>進化設定</b><span class="cnt">5 項安全邊界</span><span>影子批次數/最低樣本/自動晉升…</span></a>
  </div>

</div>
</div>
</div>

<script src="api.js?v=0.1.10"></script>
<script src="shell.js?v=0.1.10"></script>
<script src="format.js?v=0.1.10"></script>
<script src="alerts.js?v=0.1.10"></script>
<script src="pipeline.js?v=0.1.10"></script>
<script src="pipeline-preflight.js?v=0.1.10"></script>
<script src="pipeline-wizard.js?v=0.1.10"></script>
<script>
  document.getElementById('pp-add').addEventListener('click', function () { window.ppWizard(); });
  document.getElementById('pp-official-pack').addEventListener('click', function () {
    var btn = document.getElementById('pp-official-pack');
    btn.disabled = true;
    window.pdApi.post('/api/insight-tasks/official-pack').then(function (r) {
      var made = (r && r.created || []).map(function (c) { return c.name; });
      var skip = (r && r.skipped) || [];
      window.toast(made.length ? '官方套組已建立' : '官方套組已存在', made.length ? 'ok' : 'warn',
        (made.length ? '建立：' + made.join('、') + '（含週排程）' : '') +
        (skip.length ? (made.length ? '；' : '') + '已存在跳過：' + skip.join('、') : ''));
      if (window.ppRefresh) window.ppRefresh();
    }).catch(function (err) {
      window.toast((err && err.message) || '套組建立失敗', 'fail', err && err.code);
    }).finally(function () { btn.disabled = false; });
  });
  /* FM4: the asset-card counts come from the APIs at load (hardcoded numbers rot);
     any failure degrades to neutral fallback text (never an error). */
  (function fillAssetCounts() {
    var tplEl = document.getElementById('pp-cnt-templates');
    var varEl = document.getElementById('pp-cnt-vars');
    window.pdApi.get('/api/strategy-prompts').then(function (rows) {
      rows = Array.isArray(rows) ? rows : [];
      var off = rows.filter(function (r) { return !r.enabled; }).length;
      tplEl.textContent = rows.length + ' 個模板' + (off ? '・' + off + ' 停用' : '');
    }).catch(function () { tplEl.textContent = '模板庫'; });
    window.pdApi.get('/api/prompt-vars').then(function (rows) {
      rows = Array.isArray(rows) ? rows : [];
      var cats = {};
      rows.forEach(function (r) { if (r.category) cats[r.category] = 1; });
      varEl.textContent = Object.keys(cats).length + ' 類 ' + rows.length + ' 個';
    }).catch(function () { varEl.textContent = '變數總表'; });
  })();
</script>
</body>
</html>
