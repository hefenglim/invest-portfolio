<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>portfolio-dash — AI 提示詞</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"></link>
<script>try{document.documentElement.dataset.theme=localStorage.getItem("pd_theme")||"dark"}catch(e){}</script>
<link rel="stylesheet" href="styles.css"></link>
<link rel="stylesheet" href="settings.css"></link>
<link rel="stylesheet" href="input.css"></link>
<link rel="stylesheet" href="pipeline.css"></link>
</head>
<body data-page="settings-prompts" data-title="AI 提示詞">
<div class="shell">
<aside id="sidebar"></aside>
<div class="shell-main">
<header id="topbar" class="topbar"></header>
<div class="page">

  <section class="panel" data-screen-label="系統提示詞">
    <div class="panel-head">
      <h2 class="panel-title">系統提示詞</h2>
      <span class="panel-sub" id="sys-prompt-meta"></span>
      <span class="spacer"></span>
      <button class="btn" id="sys-reset" type="button" title="以官方模板庫最新版覆蓋目前內容">重置回官方版</button>
    </div>
    <div class="sys-prompt-card">
      <textarea class="input" id="sys-prompt" spellcheck="false"></textarea>
      <span class="hint">定義角色、語言與全域規則；所有 AI 呼叫（輸入解析、洞察批次）皆先套用此提示詞。</span>
    </div>
  </section>

  <section class="panel" data-screen-label="策略提示詞">
    <div class="panel-head">
      <h2 class="panel-title">策略提示詞</h2>
      <span class="panel-sub">啟用中的策略會在洞察批次依序執行，各產生一張洞察卡片</span>
      <span class="spacer"></span>
      <button class="btn" id="tpl-from-lib" type="button" title="從官方模板庫複製一份可自訂的副本">從官方模板庫新增</button>
      <button class="btn btn-primary" id="tpl-add" type="button">＋ 新增策略</button>
    </div>
    <div class="set-body">
      <div class="tpl-list" id="tpl-list"></div>
    </div>
  </section>

  <div class="save-bar" data-screen-label="儲存列">
    <span class="note">系統提示詞由「儲存設定」寫入；策略卡各自的「儲存」即時寫入資料庫</span>
    <button class="btn btn-primary" id="prompts-save" type="button">儲存設定</button>
  </div>

</div>
</div>
</div>

<script src="api.js"></script>
<script src="shell.js"></script>
<script src="format.js"></script>
<script src="alerts.js"></script>
<script src="vars.js"></script>
<script src="settings-prompts.js"></script>
<script>
/* 資產庫化：任務組合/排程/校正管理已移至洞察管線中心；舊區塊收摴保留對照（不刪功能） */
(function () {
  var page = document.querySelector('.page');
  if (!page) return;
  var banner = document.createElement('div');
  banner.className = 'pp-banner';
  banner.setAttribute('data-screen-label', '資產庫橫幅');
  var b = document.createElement('b');
  b.textContent = '本頁 = 資產庫';
  var s = document.createElement('span');
  s.textContent = '全域守則、分析模板（含官方模板庫）、數據變數與進化設定在此維護；任務的組合、排程與校正版本管理在';
  var a = document.createElement('a');
  a.className = 'btn btn-sm btn-primary';
  a.href = 'pipeline-hub.html';
  a.textContent = '洞察管線中心 →';
  banner.appendChild(b); banner.appendChild(s); banner.appendChild(a);
  page.insertBefore(banner, page.firstElementChild);

  /* The mock 組合器/校正庫 blocks were REMOVED (2026-07-05 usability decision ② — task
     management has ONE entry point: the pipeline hub). 自我進化設定 is real (wired to
     /api/evolution-config) and now renders as a normal panel; move it above the save
     bar once settings-prompts.js has mounted it (the 'pd-prompts-mounted' event). */
  document.addEventListener('pd-prompts-mounted', function () {
    var saveBar = page.querySelector('.save-bar');
    Array.prototype.slice.call(document.querySelectorAll('.panel')).forEach(function (p) {
      var h = p.querySelector('.panel-title');
      if (h && h.textContent === '自我進化設定' && saveBar) page.insertBefore(p, saveBar);
    });
  });
})();
</script>
</body>
</html>
